apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: apps
  annotations:
    nginx.ingress.kubernetes.io/app-root: /
spec:
  rules:
    - http:
        paths:
          - path: /linkding
            pathType: ImplementationSpecific
            backend:
              service:
                name: app-service-linkding
                port:
                  number: 80
