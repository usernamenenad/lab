apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: apps
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: "/"
spec:
  rules:
    - http:
        paths:
          - pathType: Prefix
            path: "/linkding"
            backend:
              service:
                name: app-service-linkding
                port:
                  number: 80
